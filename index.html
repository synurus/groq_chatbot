<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Groq 챗봇</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #f6a94a 0%, #f2542d 100%);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
  }

  .card h1 {
    margin: 0 0 4px;
    font-size: 22px;
    color: #1f2933;
  }

  .card p.subtitle {
    margin: 0 0 24px;
    font-size: 14px;
    color: #7b8794;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  #q {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #e4e7eb;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  #q:focus {
    border-color: #f2542d;
  }

  #btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #f2542d;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #btn:hover {
    background: #d9421d;
  }

  #btn:active {
    transform: scale(0.97);
  }

  .answer-box {
    background: #f8f9fb;
    border: 1px solid #e4e7eb;
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #364152;
    min-height: 60px;
  }

  .answer-box .label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #9aa5b1;
    margin-bottom: 6px;
  }

  #ans {
    color: #1f2933;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Groq 챗봇</h1>
    <p class="subtitle">궁금한 걸 물어보세요</p>

    <!-- 질문 입력칸 + 버튼 -->
    <div class="input-row">
      <input id="q" placeholder="물어보기" />
      <!-- 누르면 서버로 보냄 -->
      <button id="btn">보내기</button>
    </div>

    <!-- 답이 표시될 자리 -->
    <div class="answer-box">
      <span class="label">AI 응답</span>
      <b id="ans">…</b>
    </div>
  </div>

  <!-- 동작(JS)은 app.js 로 분리해 불러오기 -->
  <script src="app.js"></script>
</body>
</html>
