<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Groq 챗봇</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #f6a94a 0%, #f2542d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .chat-app {
    width: 100%;
    max-width: 480px;
    height: min(720px, 100%);
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 20px 24px;
    border-bottom: 1px solid #eef1f4;
    flex-shrink: 0;
  }

  .chat-header h1 {
    margin: 0 0 4px;
    font-size: 20px;
    color: #1f2933;
  }

  .chat-header p {
    margin: 0;
    font-size: 13px;
    color: #7b8794;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #f2542d;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    align-self: flex-start;
    background: #f1f3f6;
    color: #1f2933;
    border-bottom-left-radius: 4px;
  }

  .msg.bot.pending {
    color: #9aa5b1;
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid #eef1f4;
    flex-shrink: 0;
  }

  #q {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #e4e7eb;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  #q:focus {
    border-color: #f2542d;
  }

  #btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #f2542d;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #btn:hover {
    background: #d9421d;
  }

  #btn:active {
    transform: scale(0.97);
  }
</style>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <h1>Groq 챗봇</h1>
      <p>궁금한 걸 물어보세요</p>
    </div>

    <!-- 대화 내용이 쌓이는 자리 -->
    <div id="messages" class="messages"></div>

    <!-- 질문 입력칸 + 버튼 -->
    <div class="input-row">
      <input id="q" placeholder="메시지를 입력하세요" autocomplete="off" />
      <!-- 누르면 서버로 보냄 -->
      <button id="btn">보내기</button>
    </div>
  </div>

  <!-- 동작(JS)은 app.js 로 분리해 불러오기 -->
  <script src="app.js"></script>
</body>
</html>
